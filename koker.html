<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你照片攻擊！</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; 
            overflow: hidden; 
        }

        .pop-img {
            position: absolute;
            /* 陰影稍微縮小，配合變小的圖片 */
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <script>
        const imageSrc = 'joker.jpg';

        function spawnImage() {
            const img = document.createElement('img');
            img.src = imageSrc;
            img.className = 'pop-img';

            // 【修改這裡】尺寸大幅縮小，隨機設定在 50px 到 150px 之間
            const size = Math.floor(Math.random() * 100) + 50;
            img.style.width = size + 'px';

            const randomX = Math.floor(Math.random() * (window.innerWidth + size)) - size;
            const randomY = Math.floor(Math.random() * (window.innerHeight + size)) - size;

            img.style.left = randomX + 'px';
            img.style.top = randomY + 'px';

            const rotation = Math.floor(Math.random() * 90) - 45;
            
            setTimeout(() => {
                img.style.transform = `rotate(${rotation}deg)`;
            }, 200);

            document.body.appendChild(img);
        }

        spawnImage();

        // 維持每 500 毫秒 (0.5秒) 跳出一張
        // 若覺得小圖填滿太慢，可以把 500 改成 100 試試看！
        setInterval(spawnImage, 100);
    </script>
</body>
</html>
